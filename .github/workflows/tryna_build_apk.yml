name: Build Waylandie Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Android Build Tools and Platform
        shell: pwsh
        run: |
          # Install both the required build-tools (36.1.0) and the Android 36 platform
          & "$env:ANDROID_HOME\cmdline-tools\latest\bin\sdkmanager.bat" "build-tools;36.1.0" "platforms;android-36"
          
      - name: Build APK using PowerShell script
        shell: pwsh
        run: |
          cd android-app
          .\tools\build-apk.ps1

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WayLandIE-APK
          path: android-app/out/waylandie-display-mvp.apk
