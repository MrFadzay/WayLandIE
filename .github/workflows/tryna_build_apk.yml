name: Build and Package WayLandie

on:
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
    
      - name: Install Android Build Tools, Platform, and NDK r29
        shell: cmd
        run: |
          echo y| "%ANDROID_HOME%\cmdline-tools\latest\bin\sdkmanager.bat" "build-tools;36.1.0" "platforms;android-36" "ndk;29.0.14206865"
      
      - name: Build Full GPU APK
        shell: pwsh
        env:
          ANDROID_NDK_ROOT: "C:\\Android\\android-sdk\\ndk\\29.0.14206865"
        run: |
          cd android-app
          .\tools\build-apk.ps1 -RequireNative -NdkRoot $env:ANDROID_NDK_ROOT -SdkRoot "C:\Android\android-sdk"

      - name: Bundle Everything into One Zip
        shell: pwsh
        run: |
          # 1. Create the missing output folder at the repository root
          New-Item -ItemType Directory -Force out
          
          # 2. Copy the finished Full GPU APK straight into your linux-runtime directory
          # This packages everything into a single, easy file for your phone.
          Copy-Item -Path android-app/out/waylandie-display-mvp.apk -Destination linux-runtime/
          
          # 3. Zip the entire runtime folder together
          Compress-Archive -Path linux-runtime -DestinationPath out/waylandie-release-bundle.zip

      - name: Upload Single Release Bundle
        uses: actions/upload-artifact@v4
        with:
          name: WayLandIE-Phone-Bundle
          path: out/waylandie-release-bundle.zip
