name: Build WayLandie Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Android NDK
        uses: android-actions/setup-android@v3

      - name: Install Android Build Tools and Platform
        shell: cmd
        run: |
          echo y| "%ANDROID_HOME%\cmdline-tools\latest\bin\sdkmanager.bat" "build-tools;36.1.0" "platforms;android-36"

      - name: Build APK using PowerShell script
        shell: pwsh
        run: |
          cd android-app
          # Force the native path using the exact NDK provided by the runner environment
          .\tools\build-apk.ps1 -SdkRoot "C:\Android\android-sdk" -NdkRoot $env:ANDROID_NDK_ROOT -RequireNative
 
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WayLandIE-APK
          path: android-app/out/waylandie-display-mvp.apk

