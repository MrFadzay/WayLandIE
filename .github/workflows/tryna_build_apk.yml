name: Build and Package WayLandie

on:
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
    
      - name: Install Android Build Tools, Platform, and NDK r29
        shell: cmd
        run: |
          echo y| "%ANDROID_HOME%\cmdline-tools\latest\bin\sdkmanager.bat" "build-tools;36.1.0" "platforms;android-36" "ndk;29.0.14206865"
      
      - name: Build Full GPU APK
        shell: pwsh
        env:
          ANDROID_NDK_ROOT: "C:\\Android\\android-sdk\\ndk\\29.0.14206865"
        run: |
          cd android-app
          .\tools\build-apk.ps1 -RequireNative -NdkRoot $env:ANDROID_NDK_ROOT -SdkRoot "C:\Android\android-sdk"

      - name: Bundle Linux Runtime scripts
        shell: pwsh
        run: |
          # Compress the linux-runtime directory into a zip archive for phone deployment
          Compress-Archive -Path linux-runtime -DestinationPath out/waylandie-linux-runtime.zip

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WayLandIE-Release-Bundle
          path: |
            android-app/out/waylandie-display-mvp.apk
            out/waylandie-linux-runtime.zip
            
