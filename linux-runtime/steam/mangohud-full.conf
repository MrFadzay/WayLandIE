# WayLandIE full HUD profile for Steam game profiling.
legacy_layout=0
horizontal=0
position=top-left
table_columns=4
background_alpha=0.55
font_size=22
round_corners=6
fps
fps_color_change
frametime
frame_timing
histogram
gpu_stats
gpu_temp
gpu_core_clock
gpu_mem_clock
gpu_power
gpu_name
vulkan_driver
engine_version
cpu_stats
cpu_temp
cpu_power
ram
vram
wine
winesync
arch
battery
time
present_mode
refresh_rate

# WayLandIE benchmark logging for external-only game tuning.
autostart_log=1
log_duration=180
log_interval=500
output_folder=/tmp/waylandie-mangohud-logs
permit_upload=0
benchmark_percentiles=97,AVG,1,0.1
log_versioning
