# WayLandIE DXVK defaults for Proton/FEX game testing.
# This does not alter a game's in-game graphics settings.

[metro.exe]
dxgi.maxFrameLatency = 1
dxgi.forceRefreshRate = 144
dxvk.tilerMode = True
dxvk.enableGraphicsPipelineLibrary = Auto
dxvk.numCompilerThreads = 0

[metro_benchmark.exe]
dxgi.maxFrameLatency = 1
dxgi.forceRefreshRate = 144
dxvk.tilerMode = True
dxvk.enableGraphicsPipelineLibrary = Auto
dxvk.numCompilerThreads = 0
